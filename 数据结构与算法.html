<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据结构与算法 — 从零开始讲透彻</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ====== CSS Variables ====== */
:root {
  --bg-deep: #eef1f5;
  --bg-primary: #f5f6f8;
  --bg-card: #ffffff;
  --bg-card-hover: #f0f4ff;
  --bg-elevated: #e8ecf1;
  --border: #e2e8f0;
  --border-active: #c4cdd9;
  --text-primary: #1a202c;
  --text-secondary: #4a5568;
  --text-muted: #94a3b8;
  --blue: #0284c7;
  --blue-dim: #e0f2fe;
  --purple: #7c3aed;
  --purple-dim: #ede9fe;
  --pink: #db2777;
  --pink-dim: #fce7f3;
  --green: #059669;
  --green-dim: #d1fae5;
  --yellow: #d97706;
  --yellow-dim: #fef3c7;
  --red: #dc2626;
  --red-dim: #fee2e2;
  --easy: #16a34a;
  --mid: #d97706;
  --hard: #dc2626;
  --amber: #f59e0b;
  --amber-dim: #fef3c7;
  --orange: #ea580c;
  --orange-dim: #ffedd5;
  --font-display: 'Outfit', 'Noto Sans SC', sans-serif;
  --font-body: 'Noto Sans SC', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 10px;
  --radius-sm: 6px;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ====== Reset & Base ====== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background pattern */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(2, 132, 199, 0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 40%, rgba(124, 58, 237, 0.05) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 80%, rgba(219, 39, 119, 0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 10%, rgba(5, 150, 105, 0.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* Grid texture */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(180, 190, 210, 0.15) 1px, transparent 1px),
    linear-gradient(90deg, rgba(180, 190, 210, 0.15) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
  mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
}

/* ====== App Shell ====== */
.app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 20px 24px 60px; }

/* ====== Hero ====== */
.hero {
  text-align: center;
  padding: 48px 20px 36px;
  position: relative;
}
.hero-icon {
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--blue-dim), var(--purple-dim));
  border: 1px solid var(--border-active);
  border-radius: 16px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 28px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(2,132,199,0.08);
}
.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(28px, 5vw, 40px);
  font-weight: 800;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #1e40af 0%, #5b21b6 50%, #be185d 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero .subtitle {
  color: var(--text-secondary);
  font-size: 15px;
  margin-top: 8px;
  font-weight: 300;
  letter-spacing: 0.04em;
}

/* ====== Section Labels ====== */
.section-label {
  display: flex; align-items: center; gap: 10px;
  margin: 36px 0 14px;
  padding-left: 4px;
}
.section-label .dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}
.section-label span {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
}

/* ====== Card Grid ====== */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 17px 16px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  opacity: 0;
  transition: opacity var(--transition);
}
.card.blue::before { background: var(--blue); }
.card.purple::before { background: var(--purple); }
.card.pink::before { background: var(--pink); }
.card.amber::before { background: var(--orange); }
.card.green::before { background: var(--green); }
.card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-active);
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
}
.card:hover::before { opacity: 1; }
.card .emoji { font-size: 22px; margin-bottom: 8px; display: block; }
.card h3 {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 3px;
}
.card .desc {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.4;
}
.card .badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 100px;
  margin-top: 8px;
  letter-spacing: 0.03em;
}
.badge-easy { background: var(--green-dim); color: var(--easy); }
.badge-mid { background: var(--yellow-dim); color: var(--mid); }
.badge-hard { background: var(--red-dim); color: var(--hard); }
.badge-read { background: var(--amber-dim); color: var(--orange); }

/* ====== Detail View ====== */
.detail-view { display: none; }
.detail-view.active { display: block; }

/* Nav bar */
.detail-nav {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.detail-nav .back-btn {
  background: none; border: 1px solid var(--border);
  color: var(--text-primary); font-size: 14px;
  width: 34px; height: 34px; border-radius: 8px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
  font-family: var(--font-body);
}
.detail-nav .back-btn:hover {
  background: var(--bg-elevated);
  border-color: var(--border-active);
}
.detail-nav .breadcrumb {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}
.detail-nav .breadcrumb .accent { color: var(--text-secondary); }
.detail-nav .chapter-title {
  font-family: var(--font-display);
  font-size: 15px; font-weight: 700;
  margin-left: 4px;
}
.detail-nav .spacer { flex: 1; }
.detail-nav .progress {
  font-size: 11px; color: var(--text-muted);
  font-family: var(--font-mono);
}
.detail-nav .badge { margin-top: 0; }

/* Concept block */
.concept-block {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 12px;
}
.concept-block h3 {
  font-family: var(--font-display);
  font-size: 16px; font-weight: 700;
  margin-bottom: 8px;
}
.concept-block p {
  font-size: 13px; color: var(--text-secondary);
  line-height: 1.8;
}
.concept-block .highlight {
  color: var(--yellow);
  font-weight: 500;
}
.complexity-table {
  display: flex; gap: 16px; flex-wrap: wrap;
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.complexity-table .tc {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
}
.complexity-table .tc.good { color: var(--easy); }
.complexity-table .tc.ok { color: var(--yellow); }
.complexity-table .tc.slow { color: var(--red); }

/* Viz block */
.viz-block {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 12px;
}
.viz-block .viz-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 10px;
  text-transform: uppercase;
}
.viz-container {
  min-height: 180px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.viz-container canvas {
  display: block;
}
.viz-container .viz-dom {
  display: flex; align-items: center; justify-content: center;
  flex-wrap: wrap; gap: 0;
}
.viz-hint {
  text-align: center; font-size: 11px;
  color: var(--text-muted);
  margin-top: 8px;
  min-height: 18px;
}

/* Step controls */
.step-controls {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; margin-top: 10px;
}
.step-controls button {
  font-family: var(--font-body);
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-elevated);
  color: var(--text-primary);
  cursor: pointer;
  transition: all var(--transition);
}
.step-controls button:hover { border-color: var(--border-active); background: var(--bg-card-hover); }
.step-controls button:active { transform: scale(0.97); }
.step-controls button.primary { background: #1d4ed8; border-color: #1d4ed8; color: white; }
.step-controls button.primary:hover { background: #2563eb; }
.step-controls .step-indicator {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  min-width: 70px; text-align: center;
}
.step-controls button:disabled { opacity: 0.35; cursor: not-allowed; }

/* Code comparison */
.code-compare {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}
@media (max-width: 640px) { .code-compare { grid-template-columns: 1fr; } }
.code-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  overflow-x: auto;
}
.code-panel .lang-label {
  font-family: var(--font-display);
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  margin-bottom: 8px;
  text-transform: uppercase;
}
.code-panel pre {
  font-family: var(--font-mono);
  font-size: 11.5px;
  line-height: 1.8;
  color: #334155;
  white-space: pre-wrap; word-break: break-all;
}
.code-panel .kw { color: #7c3aed; }
.code-panel .fn { color: #0369a1; }
.code-panel .str { color: #059669; }
.code-panel .num { color: #d97706; }
.code-panel .cm { color: #94a3b8; font-style: italic; }
.code-panel .arrow { color: #db2777; }

/* Bottom nav */
.bottom-nav {
  display: flex; justify-content: space-between;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  margin-bottom: 40px;
}
.bottom-nav a {
  color: var(--text-secondary);
  font-size: 12px;
  text-decoration: none;
  cursor: pointer;
  transition: color var(--transition);
}
.bottom-nav a:hover { color: var(--text-primary); }
.bottom-nav a.next { color: var(--blue); font-weight: 600; }

/* ====== Footer ====== */
.footer {
  text-align: center; padding: 16px 0 20px;
  color: var(--text-muted); font-size: 11px;
  letter-spacing: 0.04em;
}

/* ====== Animations ====== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.card {
  animation: fadeInUp 0.5s ease backwards;
}
.card:nth-child(1) { animation-delay: 0.02s; }
.card:nth-child(2) { animation-delay: 0.06s; }
.card:nth-child(3) { animation-delay: 0.10s; }
.card:nth-child(4) { animation-delay: 0.14s; }
.card:nth-child(5) { animation-delay: 0.18s; }

/* Node styles for DOM-based viz */
.viz-node {
  display: inline-flex; align-items: center;
  background: var(--blue-dim);
  border: 2px solid var(--blue);
  border-radius: 8px;
  padding: 8px 14px;
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--blue);
  position: relative;
  transition: all 0.3s ease;
}
.viz-node.highlight {
  border-color: var(--green);
  background: var(--green-dim);
  color: var(--green);
  box-shadow: 0 0 16px rgba(5,150,105,0.2);
  transform: scale(1.08);
  z-index: 2;
}
.viz-node.inserting {
  border-color: var(--yellow);
  background: var(--yellow-dim);
  color: var(--yellow);
  animation: pulse 0.6s ease infinite;
}
.viz-arrow {
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 18px;
  margin: 0 2px;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 rgba(217,119,6,0); }
  50% { box-shadow: 0 0 20px rgba(217,119,6,0.2); }
}

/* Array cell */
.viz-cell {
  display: inline-flex; flex-direction: column; align-items: center;
  min-width: 44px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-active);
  border-radius: 6px;
  padding: 8px 6px 4px;
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  transition: all 0.3s ease;
}
.viz-cell .idx {
  font-size: 9px; color: var(--text-muted);
  margin-top: 2px;
}
.viz-cell.highlight {
  border-color: var(--green);
  background: var(--green-dim);
  color: var(--green);
  box-shadow: 0 0 12px rgba(5,150,105,0.18);
}
.viz-cell.comparing {
  border-color: var(--yellow);
  background: var(--yellow-dim);
  color: var(--yellow);
}

/* Stack/queue container */
.viz-stack {
  display: flex; flex-direction: column-reverse; align-items: center; gap: 3px;
}
.viz-stack-item {
  background: var(--blue-dim);
  border: 1.5px solid var(--blue);
  border-radius: 6px;
  padding: 6px 20px;
  font-family: var(--font-mono);
  font-size: 13px; font-weight: 600;
  color: var(--blue);
  transition: all 0.3s ease;
  min-width: 60px; text-align: center;
}
.viz-stack-item.top {
  border-color: var(--green);
  background: var(--green-dim);
  color: var(--green);
}
.viz-stack-item.incoming {
  animation: fadeInUp 0.3s ease;
  border-color: var(--yellow);
  background: var(--yellow-dim);
  color: var(--yellow);
}

/* Hash table */
.viz-hash {
  display: flex; gap: 4px; flex-wrap: wrap; justify-content: center;
}
.viz-bucket {
  background: var(--bg-elevated);
  border: 1px solid var(--border-active);
  border-radius: 6px;
  padding: 6px 10px;
  min-width: 60px; text-align: center;
}
.viz-bucket .bucket-idx {
  font-size: 9px; color: var(--text-muted);
  font-family: var(--font-mono);
}
.viz-bucket .bucket-val {
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 600;
  color: var(--text-primary);
}
.viz-bucket.highlight {
  border-color: var(--yellow);
  background: var(--yellow-dim);
}
.viz-bucket.highlight .bucket-val { color: var(--yellow); }
</style>
</head>
<body>

<div class="app">
  <!-- Home View -->
  <div id="home-view">
    <div class="hero">
      <div class="hero-icon">⚙️</div>
      <h1>数据结构与算法</h1>
      <p class="subtitle">从零开始，把每一个结构讲透彻</p>
    </div>

    <div class="section-label"><div class="dot" style="background:var(--orange)"></div><span style="color:var(--orange)">前置知识</span></div>
    <div class="card-grid" id="grid-primer"></div>

    <div class="section-label"><div class="dot" style="background:var(--blue)"></div><span style="color:var(--blue)">线性结构</span></div>
    <div class="card-grid" id="grid-linear"></div>

    <div class="section-label"><div class="dot" style="background:var(--purple)"></div><span style="color:var(--purple)">树形结构</span></div>
    <div class="card-grid" id="grid-tree"></div>

    <div class="section-label"><div class="dot" style="background:var(--pink)"></div><span style="color:var(--pink)">图与散列</span></div>
    <div class="card-grid" id="grid-hashgraph"></div>

    <div class="section-label"><div class="dot" style="background:var(--green)"></div><span style="color:var(--green)">算法</span></div>
    <div class="card-grid" id="grid-algo"></div>

    <div class="footer">学完 14 章，你就有了扎实的数据结构与算法基础</div>
  </div>

  <!-- Detail View -->
  <div class="detail-view" id="detail-view">
    <div class="detail-nav" id="detail-nav"></div>
    <div class="concept-block" id="concept-block"></div>
    <div class="viz-block">
      <div class="viz-label">🎬 动画演示</div>
      <div class="viz-container" id="viz-container"></div>
      <div class="viz-hint" id="viz-hint"></div>
      <div class="step-controls" id="step-controls">
        <button id="btn-prev" disabled>◀ 上一步</button>
        <span class="step-indicator" id="step-indicator">步骤 1 / 4</span>
        <button id="btn-next" class="primary">下一步 ▶</button>
        <button id="btn-reset">↺ 重置</button>
      </div>
    </div>
    <div class="code-compare" id="code-compare"></div>
    <div class="bottom-nav" id="bottom-nav"></div>
  </div>
</div>

<script>
// ==========================================================================
//  DATA
// ==========================================================================
const CHAPTERS = [
  // --- 前置知识 (amber) ---
  {
    id: 'big-o', section: 'primer', color: 'var(--orange)', colorClass: 'amber',
    emoji: '⏱️', title: '复杂度分析', desc: '大O表示法 · 时空权衡 · 增长率对比',
    difficulty: '必读', diffClass: 'badge-read', index: 0,
    concept: `<h3>什么是复杂度分析？</h3>
      <p>复杂度分析是衡量算法<span class="highlight">效率</span>的工具。它不关心具体多少秒，而是关注：<span class="highlight">数据量 n 变大时，执行时间/内存如何增长？</span></p>
      <p style="margin-top:8px"><span class="highlight">大 O 表示法</span>描述的是「增长趋势」，忽略常数和低阶项。O(2n+3) 简写为 O(n)；O(n²+100n) 简写为 O(n²)。因为当 n 很大时，常数和低阶项的影响微乎其微。</p>
      <p style="margin-top:8px"><span class="highlight">时间复杂度</span>衡量运行时间随 n 的增长；<span class="highlight">空间复杂度</span>衡量额外内存随 n 的增长。二者常常需要权衡——用空间换时间（如哈希表），或用时间换空间。</p>
      <div class="complexity-table" style="flex-direction:column;gap:4px">
        <span class="tc good">O(1) 常数 — 无论 n 多大，一步完成（数组索引访问）</span>
        <span class="tc good">O(log n) 对数 — 每次排除一半（二分搜索）</span>
        <span class="tc ok">O(n) 线性 — 每个元素看一遍（遍历数组）</span>
        <span class="tc ok">O(n log n) 线性对数 — 最优比较排序的下界（快排、归并）</span>
        <span class="tc slow">O(n²) 平方 — 嵌套循环（冒泡排序、简单匹配）</span>
      </div>`,
    steps: [
      { desc: '增长率对比：横轴=数据量 n，纵轴=操作次数。看各曲线随 n 增大如何变化' },
      { desc: 'O(1) 是一条水平线——无论 n 多大，1 步搞定。O(log n) 几乎平缓，增长极慢' },
      { desc: 'O(n) 是45°直线——n 翻倍，时间翻倍。O(n²) 是抛物线——n 翻 10 倍，时间翻 100 倍！' },
      { desc: '结论：写代码时，避免 O(n²) 及以上的算法。O(log n) ≈ O(1) 几乎一样快' },
    ],
    getPseudo: () => `复杂度比较（n=100 时）:
O(1)        → 1 次
O(log n)    → ~7 次
O(n)        → 100 次
O(n log n)  → ~700 次
O(n²)       → 10,000 次`,

    if arr[mid] < target: lo ← mid+1
    else: hi ← mid-1
  return -1`,
    getCode: () => `function binarySearch(arr, target) {
  let lo = 0, hi = arr.length - 1;
  while (lo <= hi) {
    let mid = Math.floor((lo + hi) / 2);
    if (arr[mid] === target) return mid;
    if (arr[mid] < target)
      lo = mid + 1;
    else
      hi = mid - 1;
  }
  return -1; // not found
}`,
    renderViz(stepIdx) {
      const c = document.getElementById('viz-container'); c.innerHTML = ''; c.classList.add('viz-dom');
      const arr = [2,5,8,12,16,23,38];
      const ranges = [[0,6],[4,6],[4,4],[4,4]];
      arr.forEach((v, i) => {
        const cell = document.createElement('div'); cell.className = 'viz-cell';
        cell.innerHTML = `<span>${v}</span><span class="idx">${i}</span>`;
        if (i >= ranges[stepIdx][0] && i <= ranges[stepIdx][1]) cell.classList.add('comparing');
        if (stepIdx === 3 && i === 4) cell.classList.add('highlight');
        c.appendChild(cell);
      });
      document.getElementById('viz-hint').textContent = CHAPTERS[12].steps[stepIdx].desc;
    },
  },
];

    ctx.beginPath(); ctx.moveTo(nf.x, nf.y + 14); ctx.lineTo(nt.x, nt.y - 14); ctx.stroke();
  });

  // Draw nodes
  s.nodes.forEach((n, i) => {

    ctx.beginPath(); ctx.arc(n.x, n.y, n.fill ? 13 : 14, 0, Math.PI*2);
    ctx.fillStyle = n.fill || (isHL ? '#d1fae5' : '#f5f6f8');
    ctx.fill();
    ctx.strokeStyle = isHL ? '#16a34a' : n.c;

// ==========================================================================

function drawGraphCanvas(stepIdx) {
  const c = document.getElementById('viz-container'); c.innerHTML = '';
  const canvas = document.createElement('canvas');
  canvas.width = 600; canvas.height = 240;
  canvas.style.maxWidth = '100%';
  c.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  const positions = { A: [300,30], B: [180,130], C: [420,130], D: [240,200], E: [480,200] };
  const levels = [
    { visited: ['A'], queue: ['B','C'], edges: [['A','B'],['A','C']] },
    { visited: ['A','B'], queue: ['C','D'], edges: [['A','B'],['A','C'],['B','D']] },
    { visited: ['A','B','C'], queue: ['D','E'], edges: [['A','B'],['A','C'],['B','D'],['C','D'],['C','E']] },
    { visited: ['A','B','C','D','E'], queue: [], edges: [['A','B'],['A','C'],['B','D'],['C','D'],['C','E']] },
  ];
  const level = levels[Math.min(stepIdx, 3)];

  // Draw all possible edges faintly
  const allEdges = [['A','B'],['A','C'],['B','D'],['C','D'],['C','E']];
  allEdges.forEach(([a,b]) => {
    ctx.beginPath(); ctx.moveTo(...positions[a]); ctx.lineTo(...positions[b]);
    ctx.strokeStyle = level.edges.some(e => e[0]===a&&e[1]===b) ? '#7c3aed' : '#e2e8f0';
    ctx.lineWidth = level.edges.some(e => e[0]===a&&e[1]===b) ? 2 : 1;
    ctx.stroke();
  });

  // Draw nodes
  Object.entries(positions).forEach(([label, [x,y]]) => {
    const visited = level.visited.includes(label);
    const inQueue = level.queue.includes(label);
    ctx.beginPath(); ctx.arc(x, y, 16, 0, Math.PI*2);
    ctx.fillStyle = visited ? '#ede9fe' : '#f5f6f8';
    ctx.fill();
    ctx.strokeStyle = visited ? '#16a34a' : inQueue ? '#d97706' : '#7c3aed';
    ctx.lineWidth = visited ? 2.5 : 1.5;
    ctx.stroke();
    ctx.fillStyle = visited ? '#16a34a' : inQueue ? '#d97706' : '#7c3aed';
    ctx.font = `600 12px "JetBrains Mono"`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(label, x, y);
  });
  document.getElementById('viz-hint').textContent = CHAPTERS[10].steps[stepIdx].desc;
}

// ==========================================================================
//  ROUTING & RENDERING
// ==========================================================================
let currentChapter = null;
let currentStep = 0;

function showHome() {
  document.getElementById('home-view').style.display = 'block';
  document.getElementById('detail-view').classList.remove('active');
  window.location.hash = '';
  currentChapter = null;
}

function showChapter(chapterId) {
  const ch = CHAPTERS.find(c => c.id === chapterId);
  if (!ch) return;
  currentChapter = ch;
  currentStep = 0;
  window.location.hash = ch.id;
  document.getElementById('home-view').style.display = 'none';
  document.getElementById('detail-view').classList.add('active');

  // Nav
  const sectionNames = { primer: '前置知识', linear: '线性结构', tree: '树形结构', hashgraph: '图与散列', algo: '算法' };
  document.getElementById('detail-nav').innerHTML = `
    <button class="back-btn" onclick="showHome()">←</button>
    <span class="breadcrumb"><span class="accent">${sectionNames[ch.section]} /</span></span>
    <span class="chapter-title">${ch.emoji} ${ch.title}</span>
    <span class="spacer"></span>
    <span class="progress">${ch.index + 1} / 14</span>
    <span class="badge ${ch.diffClass}">${ch.difficulty}</span>
  `;

  // Concept
  document.getElementById('concept-block').innerHTML = ch.concept;

  // Viz
  document.getElementById('step-indicator').textContent = `步骤 1 / ${ch.steps.length}`;
  document.getElementById('btn-prev').disabled = true;
  document.getElementById('btn-next').disabled = ch.steps.length <= 1;
  ch.renderViz(0);

  // Code
  document.getElementById('code-compare').innerHTML = `
    <div class="code-panel">
      <div class="lang-label" style="color:var(--purple)">📋 伪代码</div>
      <pre>${escapeHtml(ch.getPseudo())}</pre>
    </div>
    <div class="code-panel">
      <div class="lang-label" style="color:var(--yellow)">⚡ JavaScript</div>
      <pre>${escapeHtml(ch.getCode())}</pre>
    </div>
  `;

  // Bottom nav
  const prevCh = CHAPTERS.find(c => c.index === ch.index - 1);
  const nextCh = CHAPTERS.find(c => c.index === ch.index + 1);
  document.getElementById('bottom-nav').innerHTML = `
    ${prevCh ? `<a onclick="showChapter('${prevCh.id}')">← ${prevCh.emoji} ${prevCh.title}</a>` : '<span></span>'}
    ${nextCh ? `<a class="next" onclick="showChapter('${nextCh.id}')">${nextCh.emoji} ${nextCh.title} →</a>` : '<span></span>'}
  `;
}

function stepNext() {
  if (!currentChapter || currentStep >= currentChapter.steps.length - 1) return;
  currentStep++;
  updateStepUI();
}

function stepPrev() {
  if (!currentChapter || currentStep <= 0) return;
  currentStep--;
  updateStepUI();
}

function stepReset() {
  currentStep = 0;
  updateStepUI();
}

function updateStepUI() {
  const ch = currentChapter;
  document.getElementById('step-indicator').textContent = `步骤 ${currentStep + 1} / ${ch.steps.length}`;
  document.getElementById('btn-prev').disabled = currentStep === 0;
  document.getElementById('btn-next').disabled = currentStep >= ch.steps.length - 1;
  ch.renderViz(currentStep);
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ==========================================================================
//  INIT
// ==========================================================================
function renderHomeCards() {
  const sections = {
    primer: document.getElementById('grid-primer'),
    linear: document.getElementById('grid-linear'),
    tree: document.getElementById('grid-tree'),
    hashgraph: document.getElementById('grid-hashgraph'),
    algo: document.getElementById('grid-algo'),
  };
  CHAPTERS.forEach(ch => {
    const card = document.createElement('div');
    card.className = `card ${ch.colorClass}`;
    card.onclick = () => showChapter(ch.id);
    card.innerHTML = `
      <span class="emoji">${ch.emoji}</span>
      <h3>${ch.title}</h3>
      <p class="desc">${ch.desc}</p>
      <span class="badge ${ch.diffClass}">${ch.difficulty}</span>
    `;
    sections[ch.section].appendChild(card);
  });
}

document.getElementById('btn-prev').addEventListener('click', stepPrev);
document.getElementById('btn-next').addEventListener('click', stepNext);
document.getElementById('btn-reset').addEventListener('click', stepReset);

renderHomeCards();

// Handle browser back/forward
window.addEventListener('hashchange', () => {
  const hash = window.location.hash.slice(1);
  if (!hash) showHome();
  else {
    const ch = CHAPTERS.find(c => c.id === hash);
    if (ch) showChapter(ch.id);
  }
});

// Load from hash on start
if (window.location.hash) {
  const hash = window.location.hash.slice(1);
  const ch = CHAPTERS.find(c => c.id === hash);
  if (ch) showChapter(ch.id);
}
</script>
